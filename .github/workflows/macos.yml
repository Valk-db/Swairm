name: macos-swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Configure Git for SwiftPM
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Clear SwiftPM Cache
        run: rm -rf .build ~/Library/Caches/org.swift.swiftpm

      - name: swift build
        run: swift build

      - name: swift test
        run: swift test

  # End-to-end: real Python Anchor + Swift phone fleet over HTTP.
  # Proves the Swift .npz codec is byte-compatible with numpy's.
  integration:
    runs-on: macos-15
    needs: build-test
    steps:
      - uses: actions/checkout@v5

      - name: Configure Git for SwiftPM
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Clear SwiftPM Cache
        run: rm -rf .build ~/Library/Caches/org.swift.swiftpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Anchor dependencies
        run: pip install numpy scikit-learn fastapi uvicorn

      # Exercises the full worker path (enqueue -> drain_once -> aggregate ->
      # snapshot) without HTTP. Catches worker-side errors (e.g. NameError in
      # drain_once) that otherwise only surface as silently stalled rounds.
      - name: Anchor self-test (worker path)
        run: |
          python main.py --selftest
          rm -rf queue models state.json

      - name: Start Anchor (fast aggregation interval)
        run: |
          FCS_AGG_INTERVAL_S=5 nohup uvicorn main:app --host 127.0.0.1 --port 8000 > anchor.log 2>&1 &
          sleep 3
          curl -sf http://127.0.0.1:8000/status

      - name: Run Swift fleet against the Anchor
        run: swift run swairm-client --anchor http://127.0.0.1:8000 --fleet 6 --rounds 3 --interval 8

      - name: Verify aggregation rounds happened
        run: |
          curl -sf http://127.0.0.1:8000/status -o status.json
          cat status.json
          python -c "import json; s = json.load(open('status.json')); assert s['version'] >= 3, s; print('OK: version advanced to', s['version'])"

      - name: Show Anchor log
        if: always()
        run: cat anchor.log

  # Sideloadable iOS app: build unsigned in CI, re-sign locally with
  # Sideloadly (App/project.yml pins the no-codesign settings).
  sideload-ipa:
    runs-on: macos-15
    needs: build-test
    steps:
      - uses: actions/checkout@v5

      - name: Configure Git for SwiftPM
        run: git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Clear SwiftPM Cache
        run: rm -rf .build ~/Library/Caches/org.swift.swiftpm

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd App && xcodegen generate

      - name: Build unsigned iOS app
        run: |
          xcodebuild build \
            -project App/Swairm.xcodeproj \
            -scheme SwairmApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath .build/ios \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R ".build/ios/Build/Products/Release-iphoneos/SwairmApp.app" Payload/
          zip -qry Swairm-unsigned.ipa Payload
          ls -la Swairm-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Swairm-unsigned-ipa
          path: Swairm-unsigned.ipa
          retention-days: 14